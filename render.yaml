services:
  - type: web
    name: raddictate
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run db:push; npm run start
    healthCheckPath: /api/templates
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: raddictate-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: raddictate-db
    databaseName: raddictate
    user: raddictate
    region: oregon
    plan: free
